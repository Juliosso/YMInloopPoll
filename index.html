<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huwelijks APK Poll - YM Design</title>
    <style>
        /* --- Moderne, Professionele YM UI Instellingen --- */
        body {
            /* Diep donkere achtergrond, past beter bij presentaties/beamers */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            position: relative;
            color: #e2e8f0; /* Zacht witte tekst voor goed contrast */
        }

        .achtergrond-logo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('YMtransparant.png'); 
            background-size: 100% 100%; /* Aangepast naar cover voor betere schaling */
            background-position: center;
            opacity: 0.05; /* Heel subtiel op de achtergrond */
            z-index: -1; 
        }

        /* --- Split Screen Layout --- */
        .split-layout {
            display: grid;
            grid-template-columns: 35% 65%;
            height: 100vh;
            width: 100vw;
        }

        .qr-section, .quiz-section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
            height: 100%;
            box-sizing: border-box;
        }

        /* --- De Kaarten (Glassmorphism effect, strak en modern) --- */
        .card, .qr-card {
            background-color: rgba(30, 41, 59, 0.7); /* Donker transparant */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            width: 100%;
        }

        .qr-card { max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .card { max-width: 850px; z-index: 10; text-align: left; }

        /* Typografie */
        .qr-card h2 { color: #d4c4a8; font-size: 28px; margin-bottom: 30px; margin-top: 0; font-weight: 400; letter-spacing: 1px; }
        
        h1 { color: #d4c4a8; font-size: 42px; margin-bottom: 5px; margin-top: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        
        /* NIEUW: Duidelijke tik-instructie met animatie */
        .tik-instructie { 
            color: #38bdf8; /* Opvallend blauw */
            font-size: 22px; 
            font-weight: 600; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        p.vraag { color: #cbd5e1; font-size: 24px; margin-bottom: 40px; font-weight: 300; line-height: 1.4; }

        .qr-image { width: 100%; max-width: 250px; border-radius: 12px; border: 5px solid rgba(255,255,255,0.9); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

        /* --- Poll Elementen --- */
        .optie-rij { display: flex; align-items: center; margin-bottom: 20px; justify-content: flex-start; }

        .stem-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 196, 168, 0.3); /* YM Goud/Beige rand */
            color: #f8fafc;
            /* NIEUW: Grotere padding en lettertype */
            padding: 22px 30px;
            font-size: 20px;
            font-weight: 500;
            border-radius: 14px;
            cursor: pointer;
            /* NIEUW: Bredere knop */
            width: 320px; 
            text-align: left; /* Tekst links uitlijnen staat professioneler */
            transition: all 0.3s ease;
            margin-right: 25px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .stem-btn span { font-weight: 700; color: #d4c4a8; font-size: 22px; }

        .stem-btn:hover { background: rgba(212, 196, 168, 0.15); border-color: rgba(212, 196, 168, 0.8); }
        .stem-btn:active { transform: scale(0.98); }
        .stem-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: scale(1); background: rgba(255,255,255,0.02); }

        /* --- Strakke Poll Balken --- */
        .balk-container {
            background-color: rgba(15, 23, 42, 0.6); /* Donkere gleuf */
            /* NIEUW: Balk in verhouding met grotere knop */
            height: 55px; 
            width: 100%;
            border-radius: 30px;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            overflow: hidden; /* Houdt de vulling netjes binnen de randen */
        }

        .balk-vulling {
            height: 100%;
            width: 0%; 
            border-radius: 30px;
            transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            /* Een elegante, subtiele gradient in de YM kleuren */
            background: linear-gradient(90deg, #475569 0%, #d4c4a8 100%);
            box-shadow: 0 0 15px rgba(212, 196, 168, 0.2);
        }

        .stem-cijfer {
            position: absolute;
            top: 0;
            height: 55px;
            line-height: 55px;
            font-size: 18px;
            font-weight: 600;
            transition: left 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), color 0.3s;
            color: #f8fafc;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8); /* Zorgt dat cijfer altijd leesbaar is */
        }

        /* --- Geheime Beheerder functionaliteit (ongewijzigd qua werking, wel gestyled) --- */
        .geheime-knop { position: absolute; top: 0; right: 0; width: 100px; height: 100px; z-index: 999; cursor: default; }
        .admin-menu { display: none; position: absolute; bottom: 30px; right: 30px; background-color: #1e293b; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .admin-btn { background-color: #334155; color: #f8fafc; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; margin: 0 5px; transition: background 0.2s; }
        .admin-btn:hover { background-color: #475569; }
        .admin-btn.rood { background-color: #991b1b; }
        .admin-btn.rood:hover { background-color: #b91c1c; }
        #file-input { display: none; } 

    </style>
</head>
<body>

    <div class="geheime-knop" onclick="checkGeheimeKlik()"></div>
    <div class="achtergrond-logo"></div>

    <div class="split-layout">
        
        <div class="qr-section">
            <div class="qr-card">
                <h2>Scan en vul in!</h2>
                <img src="qrcodequizhapk.png" alt="Scan QR om in te vullen" class="qr-image">
                <p style="color: #94a3b8; font-size: 14px; margin-top: 25px;">Gebruik de camera van je telefoon</p>
            </div>
        </div>

        <div class="quiz-section">
            <div class="card">
                <h1>Huwelijks APK</h1>
                <div class="tik-instructie">👆 Tik op het scherm om te stemmen!</div>
                <p class="vraag">Wat is volgens jou het allerbelangrijkste ingrediënt voor een sterk huwelijk?</p>

                <div class="optie-rij">
                    <button class="stem-btn" onclick="stem(0)"><span>1.</span> Humor & Lachen</button>
                    <div class="balk-container" id="container-0">
                        <div id="vulling-0" class="balk-vulling"></div>
                        <div id="cijfer-0" class="stem-cijfer">0</div>
                    </div>
                </div>

                <div class="optie-rij">
                    <button class="stem-btn" onclick="stem(1)"><span>2.</span> Wederzijds Vertrouwen</button>
                    <div class="balk-container" id="container-1">
                        <div id="vulling-1" class="balk-vulling"></div>
                        <div id="cijfer-1" class="stem-cijfer">0</div>
                    </div>
                </div>

                <div class="optie-rij">
                    <button class="stem-btn" onclick="stem(2)"><span>3.</span> Open Communicatie</button>
                    <div class="balk-container" id="container-2">
                        <div id="vulling-2" class="balk-vulling"></div>
                        <div id="cijfer-2" class="stem-cijfer">0</div>
                    </div>
                </div>

                <div class="optie-rij">
                    <button class="stem-btn" onclick="stem(3)"><span>4.</span> Samen Bidden (Geloof)</button>
                    <div class="balk-container" id="container-3">
                        <div id="vulling-3" class="balk-vulling"></div>
                        <div id="cijfer-3" class="stem-cijfer">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-menu" id="admin-menu">
        <strong style="display: block; margin-bottom: 15px; color: #cbd5e1;">Beheerdersmenu</strong>
        <button class="admin-btn" onclick="slaOpAlsTXT()">Opslaan</button>
        <button class="admin-btn" onclick="document.getElementById('file-input').click()">Inladen</button>
        <button class="admin-btn rood" onclick="resetStemmen()">Reset</button>
        <button class="admin-btn" onclick="sluitAdmin()">Sluit</button>
        <input type="file" id="file-input" accept=".txt" onchange="laadVanTXT(event)">
    </div>

    <script>
        let stemmen = JSON.parse(localStorage.getItem('apkStemmen')) || [0, 0, 0, 0];

        // --- Geheime Beheerder Logica ---
        let klikTeller = 0;
        let klikTimer;

        function checkGeheimeKlik() {
            klikTeller++;
            clearTimeout(klikTimer);
            klikTimer = setTimeout(() => { klikTeller = 0; }, 2000);

            if (klikTeller >= 5) {
                klikTeller = 0; 
                let pin = prompt("Pincode (Beheer):");
                if (pin === "0000") {
                    document.getElementById('admin-menu').style.display = 'block';
                }
            }
        }

        function sluitAdmin() { document.getElementById('admin-menu').style.display = 'none'; }

        // --- Stem logica met Cooldown ---
        let kanStemmen = true; 

        function stem(index) {
            if (!kanStemmen) return; 

            kanStemmen = false; 
            let knoppen = document.querySelectorAll('.stem-btn');
            knoppen.forEach(knop => knop.disabled = true);

            stemmen[index]++;
            localStorage.setItem('apkStemmen', JSON.stringify(stemmen));
            tekenBalken();

            setTimeout(() => {
                kanStemmen = true;
                knoppen.forEach(knop => knop.disabled = false);
            }, 1000); 
        }

        function tekenBalken() {
            let maxStemmen = Math.max(...stemmen);
            if (maxStemmen === 0) maxStemmen = 1; 

            for (let i = 0; i < 4; i++) {
                let percentage = (stemmen[i] / maxStemmen) * 100;
                let vulling = document.getElementById('vulling-' + i);
                let cijfer = document.getElementById('cijfer-' + i);
                let container = document.getElementById('container-' + i);

                vulling.style.width = percentage + '%';
                cijfer.innerText = stemmen[i];

                let containerBreedte = container.offsetWidth;
                let pixelBreedte = (percentage / 100) * containerBreedte;

                if (pixelBreedte > 30) {
                    cijfer.style.left = (pixelBreedte / 2) + 'px';
                    cijfer.style.transform = 'translateX(-50%)'; 
                } else {
                    cijfer.style.left = (pixelBreedte + 15) + 'px';
                    cijfer.style.transform = 'none';
                }
            }
        }

        // --- Opslaan & Laden ---
        function slaOpAlsTXT() {
            const tekst = stemmen.join(',');
            const blob = new Blob([tekst], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none'; a.href = url; a.download = 'stemmen.txt';
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.body.removeChild(a);
        }

        function laadVanTXT(event) {
            const bestand = event.target.files[0];
            if (!bestand) return;
            const lezer = new FileReader();
            lezer.onload = function(e) {
                const inhoud = e.target.result.trim();
                if (inhoud) {
                    const geladenStemmen = inhoud.split(',').map(Nummer => parseInt(Nummer, 10));
                    if (geladenStemmen.length === 4 && !geladenStemmen.some(isNaN)) {
                        stemmen = geladenStemmen;
                        localStorage.setItem('apkStemmen', JSON.stringify(stemmen));
                        tekenBalken();
                    }
                }
            };
            lezer.readAsText(bestand);
            event.target.value = ''; 
        }

        function resetStemmen() {
            if(confirm("Zeker weten? Alle stemmen gaan naar 0.")) {
                stemmen = [0, 0, 0, 0];
                localStorage.setItem('apkStemmen', JSON.stringify(stemmen));
                tekenBalken();
                sluitAdmin(); 
            }
        }

        window.onload = tekenBalken;
        window.addEventListener('resize', tekenBalken);
    </script>
</body>
</html>
