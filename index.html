<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YM Welkomstbord - Huwelijk</title>
    <style>
        /* --- YM UI Instellingen --- */
        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            /* Warme, chique gradient passend bij de liefde */
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #2e1065 100%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f8fafc; overflow: hidden;
            touch-action: manipulation; 
            -webkit-user-select: none; 
            user-select: none;
        }

        .achtergrond-logo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('NoYMtransparant.png'); 
            background-size: cover; background-position: center;
            opacity: 0.04; z-index: -1; 
        }

        /* Subtiele zwevende lichtdeeltjes voor een magische sfeer */
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .particle {
            position: absolute; border-radius: 50%; background: rgba(212, 196, 168, 0.3);
            animation: floatUp 15s infinite linear;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* --- De Kaart (Nu gecentreerd en rustig) --- */
        .card {
            background-color: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px;
            padding: 80px 100px; width: 85%; max-width: 1200px; 
            box-shadow: 0 35px 70px rgba(0,0,0,0.6);
            text-align: center;
            z-index: 10;
        }

        /* Typografie */
        h1 {
            color: #d4c4a8; font-size: 65px; margin: 0 0 15px 0; 
            font-weight: 300; letter-spacing: 3px; text-transform: uppercase;
        }
        
        h2 {
            color: #fff; font-size: 36px; margin: 0 0 60px 0; font-weight: 300;
        }

        /* De IJsbreker Vraag */
        .ijsbreker-box {
            background: rgba(0, 0, 0, 0.2); 
            border: 2px dashed rgba(212, 196, 168, 0.4);
            padding: 50px; 
            border-radius: 20px;
            margin: 0 auto 50px auto;
            max-width: 900px;
        }

        .ijsbreker-box h3 {
            color: #38bdf8; font-size: 24px; margin: 0 0 25px 0; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
        }

        .ijsbreker-box p {
            font-size: 38px; font-style: italic; color: #e2e8f0; 
            margin: 0; line-height: 1.4; font-weight: 300;
        }

        .voettekst {
            color: #94a3b8; font-size: 22px; letter-spacing: 1px; margin: 0;
        }

        /* --- Geheime Beheerder functionaliteit --- */
        .geheime-knop { position: absolute; top: 0; right: 0; width: 150px; height: 150px; z-index: 999; cursor: default; }
        .admin-menu { display: none; position: absolute; top: 20px; left: 20px; background-color: rgba(30, 41, 59, 0.95); padding: 25px; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); z-index: 1000; min-width: 250px; backdrop-filter: blur(10px); }
        .admin-btn { background-color: #334155; color: #f8fafc; border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; margin-bottom: 12px; display: block; width: 100%; transition: background 0.2s;}
        .admin-btn:hover { background-color: #475569; }
        .admin-btn.geel { background-color: #d97706; margin-bottom: 20px; } 
        .admin-btn.geel:hover { background-color: #b45309; }

    </style>
</head>
<body onclick="startFullscreen()" oncontextmenu="return false;">

    <div class="geheime-knop" onclick="checkGeheimeKlik(event)"></div>
    <div class="achtergrond-logo"></div>

    <div class="particles" id="particles"></div>
    <script>
        const container = document.getElementById('particles');
        for(let i=0; i<15; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 10 + 5) + 'px';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(p);
        }
    </script>

    <div class="card">
        <h1>Welkom bij de huwelijksbijeenkomst!</h1>
        <h2></h2>
        
        <div class="ijsbreker-box">
            <h3>💬 Denkvraag voor jullie samen:</h3>
            <p>"Wat was het moment waarop je dacht: 'Met deze persoon wil ik trouwen'?"</p>
        </div>
        
        <p class="voettekst">Neem rustig plaats. We beginnen zo!</p>
    </div>

    <div class="admin-menu" id="admin-menu">
        <strong style="display: block; margin-bottom: 20px; color: #d4c4a8; font-size: 20px; font-weight: 400; text-transform: uppercase;">Beheerdersmenu</strong>
        <button class="admin-btn geel" id="fullscreen-btn" onclick="toggleFullscreen()">🔲 Uit Fullscreen gaan</button>
        <button class="admin-btn" onclick="sluitAdmin()">❌ Sluit Paneel</button>
    </div>

    <script>
        // --- Fullscreen & Admin Logica ---
        let hasStartedFullscreen = false;

        function startFullscreen() {
            if (!hasStartedFullscreen) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) { elem.requestFullscreen(); }
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
                else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); } 
                hasStartedFullscreen = true;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) { elem.requestFullscreen(); }
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
                document.getElementById('fullscreen-btn').innerText = "🔲 Uit Fullscreen gaan";
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                document.getElementById('fullscreen-btn').innerText = "🔲 In Fullscreen gaan";
                hasStartedFullscreen = false; 
            }
        }

        let klikTeller = 0;
        let klikTimer;

        function checkGeheimeKlik(event) {
            event.stopPropagation(); 
            klikTeller++;
            clearTimeout(klikTimer);
            klikTimer = setTimeout(() => { klikTeller = 0; }, 2000);

            if (klikTeller >= 5) {
                klikTeller = 0; 
                let pin = prompt("Pincode (Beheer):");
                if (pin === "0000") {
                    document.getElementById('admin-menu').style.display = 'block';
                }
            }
        }

        function sluitAdmin() { document.getElementById('admin-menu').style.display = 'none'; }
    </script>
</body>
</html>
